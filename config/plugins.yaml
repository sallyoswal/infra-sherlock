# local = fixture/testing mode; cloud = production collectors/notifiers.
mode: cloud

# Optional collectors (used only when mode=cloud): aws_cloudwatch, datadog, pagerduty
collectors:
  - aws_cloudwatch
  - datadog
  - pagerduty

# Optional notifiers (used only when mode=cloud): slack
notifiers:
  - slack

# Soft guardrail for future collector calls.
max_api_calls_per_run: 20
